name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-decision:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require a release decision
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HAS_NO_RELEASE_LABEL: >-
            ${{ contains(github.event.pull_request.labels.*.name, 'no-release') }}
        run: |
          if [ "$HAS_NO_RELEASE_LABEL" = "true" ]; then
            exit 0
          fi

          changeset_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^\.changeset/[^/]+\.md$' \
            | grep -v '^\.changeset/README\.md$' || true)

          if [ -n "$changeset_files" ]; then
            exit 0
          fi

          echo "A pull request needs a Changeset or the no-release label."
          exit 1

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Install Luau packages
        run: mise --no-config exec github:pesde-pkg/pesde@0.7.3+registry.0.2.3 --command "pesde install"

      - name: Check formatting
        run: mise --no-config exec github:JohnnyMorganz/StyLua@2.5.2 --command "stylua --check ."

      - name: Select a published Lutest dependency
        if: >-
          github.event_name == 'push' ||
          github.head_ref == 'changeset-release/main'
        run: |
          target_tag=$(sed -n "s/.*rev = '\(v[^']*\)'.*/\1/p" loom.config.luau)

          if [ -z "$target_tag" ]; then
            echo "Could not read the Lutest dependency tag from loom.config.luau."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$target_tag" > /dev/null; then
            echo "Lutest $target_tag is already published."
            exit 0
          fi

          bootstrap_tag=$(git describe --tags --abbrev=0)

          if [ "$bootstrap_tag" = "$target_tag" ]; then
            echo "Lutest $target_tag is unavailable and no earlier published tag was found."
            exit 1
          fi

          echo "Bootstrapping unavailable $target_tag from published $bootstrap_tag."
          echo "LUTEST_BOOTSTRAP_TAG=$bootstrap_tag" >> "$GITHUB_ENV"

      - name: Prepare release self-hosting dependencies
        if: env.LUTEST_BOOTSTRAP_TAG != ''
        run: node scripts/prepare-release-selfhost.mjs

      - name: Install Loom dependencies
        run: >-
          mise --no-config exec github:luau-lang/lute@1.0.0
          --command "lute pkg install"

      - name: Install Lute type definitions
        run: >-
          mise --no-config exec github:luau-lang/lute@1.0.0
          --command "lute setup"

      - name: Run typecheck
        run: mise run typecheck

      - name: Build Lutest
        run: mise --no-config exec github:luau-lang/lute@1.0.0 cargo:darklua@0.19.0 --command "lute run scripts/release.luau cli/init.luau .tmp/ci-bundle/main.luau .tmp/ci-bin/lutest"

      - name: Run tests
        run: .tmp/ci-bin/lutest test

      - name: Upload CI binary
        uses: actions/upload-artifact@v5
        with:
          name: lutest-ci-linux-x64
          path: .tmp/ci-bin/lutest
          if-no-files-found: error
          retention-days: 1

  roblox:
    needs: quality
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Download CI binary
        uses: actions/download-artifact@v5
        with:
          name: lutest-ci-linux-x64
          path: .tmp/ci-bin

      - name: Run Roblox tests
        env:
          ROBLOX_OPEN_CLOUD_API_KEY: ${{ secrets.ROBLOX_OPEN_CLOUD_API_KEY }}
        run: |
          chmod +x .tmp/ci-bin/lutest
          mise --no-config exec github:lune-org/lune@0.10.5 \
            --command ".tmp/ci-bin/lutest test game --runtime roblox"

  release-validation:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/release-validation.yml
    secrets: inherit
