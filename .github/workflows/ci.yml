name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install Luau packages
        run: mise exec -- pesde install

      - name: Check formatting
        run: mise exec -- stylua --check .

      - name: Run lint
        run: mise exec -- lute lint .
