name: Publish release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  validate:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'changeset-release/main'
    uses: ./.github/workflows/release-validation.yml

  publish:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Download validated binaries
        uses: actions/download-artifact@v5
        with:
          pattern: lutest-*
          path: .tmp/release-assets

      - name: Name release assets
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          mkdir -p dist
          mv .tmp/release-assets/lutest-windows-x64/lutest.exe \
            "dist/lutest-v${VERSION}-windows-x64.exe"
          mv .tmp/release-assets/lutest-linux-x64/lutest \
            "dist/lutest-v${VERSION}-linux-x64"
          mv .tmp/release-assets/lutest-macos-arm64/lutest \
            "dist/lutest-v${VERSION}-macos-arm64"

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          awk -v ver="$VERSION" '
            $0 == "## " ver { found = 1 }
            found { print }
            found && /^## / && $0 != "## " ver { exit }
          ' CHANGELOG.md > .tmp/release-notes.md

      - name: Prepare Wally package
        run: mise run build-wally-package

      - name: Publish Wally package
        env:
          WALLY_AUTH_TOKEN: ${{ secrets.WALLY_AUTH_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          metadata_url="https://api.wally.run/v1/package-metadata/lutest-dev/lutest"
          metadata="$(curl --fail --silent "$metadata_url" || true)"
          if [ -n "$metadata" ] && jq --exit-status \
            --arg version "$VERSION" \
            'any(.versions[]; .package.version == $version)' \
            <<< "$metadata" > /dev/null; then
            echo "Wally package lutest-dev/lutest@$VERSION already exists."
            exit 0
          fi

          mise --no-config exec github:UpliftGames/wally@0.3.2 --command \
            "wally login --project-path .tmp/wally-package --token $WALLY_AUTH_TOKEN"
          mise --no-config exec github:UpliftGames/wally@0.3.2 --command \
            "wally publish --project-path .tmp/wally-package"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          gh release create "v${VERSION}" \
            dist/lutest-v${VERSION}-windows-x64.exe \
            dist/lutest-v${VERSION}-linux-x64 \
            dist/lutest-v${VERSION}-macos-arm64 \
            --title "v${VERSION}" \
            --notes-file .tmp/release-notes.md
