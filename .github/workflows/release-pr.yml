name: Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Release PR title
        id: release-details
        run: |
          pnpm exec changeset status --output="$RUNNER_TEMP/release-plan.json"
          node scripts/release-pr-title.mjs "$RUNNER_TEMP/release-plan.json" >> "$GITHUB_OUTPUT"

      - name: Create or update Release PR
        uses: changesets/action@v1
        with:
          version: pnpm release:version
          commit: "chore(release): prepare next release"
          title: ${{ steps.release-details.outputs.title }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
          HUSKY: "0"
