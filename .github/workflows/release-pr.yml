name: Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Install commit hook tools
        run: |
          mise --no-config exec github:JohnnyMorganz/StyLua@2.5.2 \
            --command "stylua --version"
          mise --no-config exec github:luau-lang/lute@1.0.0 \
            --command "lute --version"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update Release PR
        uses: changesets/action@v1
        with:
          version: pnpm release:version
          commit: "chore(release): prepare next release"
          title: "chore(release): prepare next release"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
