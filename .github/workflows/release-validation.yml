name: Release validation

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: release-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            binary: .tmp/release-validation/lutest.exe
            darklua_cache_path: ~/AppData/Local/mise/installs/cargo-darklua
          - platform: linux-x64
            runner: ubuntu-latest
            binary: .tmp/release-validation/lutest
            darklua_cache_path: ~/.local/share/mise/installs/cargo-darklua
          - platform: macos-arm64
            runner: macos-latest
            binary: .tmp/release-validation/lutest
            darklua_cache_path: ~/.local/share/mise/installs/cargo-darklua

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Restore Darklua cache
        uses: actions/cache@v5
        with:
          path: ${{ matrix.darklua_cache_path }}
          key: darklua-${{ runner.os }}-${{ runner.arch }}-0.19.0

      - name: Install Luau packages
        run: >-
          mise --no-config exec
          github:pesde-pkg/pesde@0.7.3+registry.0.2.3
          --command "pesde install"

      - name: Build release binary
        run: >-
          mise --no-config exec github:luau-lang/lute@1.0.0 cargo:darklua@0.19.0
          --command "lute run scripts/release.luau cli/init.luau
          .tmp/release-validation/main.luau ${{ matrix.binary }}"

      - name: Smoke test release binary
        shell: pwsh
        run: |
          $binary = Join-Path $PWD '${{ matrix.binary }}'

          if ($env:RUNNER_OS -ne 'Windows') {
            chmod +x $binary
          }

          & $binary version
          & $binary test

      - name: Prepare Wally package
        if: matrix.platform == 'linux-x64'
        run: >-
          mise --no-config exec github:luau-lang/lute@1.0.0
          --command "lute run scripts/build-wally-package.luau"

      - name: Validate Wally package
        if: matrix.platform == 'linux-x64'
        run: >-
          mise --no-config exec github:UpliftGames/wally@0.3.2
          --command "wally package --project-path .tmp/wally-package
          --output .tmp/wally-package.tar.gz"

      - name: Upload validated binary
        uses: actions/upload-artifact@v5
        with:
          name: lutest-${{ matrix.platform }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 1
