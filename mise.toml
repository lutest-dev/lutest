[tools]
"github:luau-lang/lute" = "1.0.0"
"github:lune-org/lune" = "0.10.5"
"github:luau-lang/luau" = "0.727"
"github:JohnnyMorganz/luau-lsp" = "1.68.1"
"github:pesde-pkg/pesde" = "0.7.3+registry.0.2.3"
"github:JohnnyMorganz/StyLua" = "2.5.2"
"github:UpliftGames/wally" = "0.3.2"
"cargo:darklua" = "0.19.0"
"github:lutest-dev/lutest" = "0.6.0"
node = "24.15.0"
"npm:pnpm" = "11.0.9"

[tasks.format]
description = "Format project Luau files with StyLua"
run = "stylua ."

[tasks.format-check]
description = "Check project Luau formatting with StyLua"
run = "stylua --check ."

[tasks.lint]
description = "Lint project Luau files with lute"
run = "lute lint ."

[tasks.typecheck]
description = "Typecheck project Luau files with luau-lsp analyze"
depends = ["ensure-roblox-defs"]
run = "lute run scripts/typecheck.luau"

[tasks.ensure-roblox-defs]
description = "Ensure Roblox Luau definitions are cached for CLI typechecking"
run = "lute run scripts/ensure-roblox-defs.luau"

[tasks.check]
description = "Run formatting, lint, and typecheck checks"
depends = ["format-check", "lint", "typecheck"]

[tasks.build-wally-package]
description = "Prepare the Roblox Wally package in .tmp/wally-package"
run = "lute run scripts/build-wally-package.luau"
